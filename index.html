<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRAT Prep - Cybersecurity</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --panel: #111418;
    --border: #1e2530;
    --accent: #00e5ff;
    --accent2: #ff3c6e;
    --accent3: #7fff6e;
    --text: #e8edf5;
    --muted: #5a6678;
    --easy: #7fff6e;
    --medium: #ffd24d;
    --hard: #ff3c6e;
    --scenario: #b16fff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 760px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  /* HEADER */
  header {
    border-left: 4px solid var(--accent);
    padding-left: 20px;
    margin-bottom: 36px;
  }
  header .tag {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  header h1 {
    font-size: clamp(24px, 5vw, 40px);
    font-weight: 800;
    line-height: 1.1;
    margin-bottom: 8px;
  }
  header h1 span { color: var(--accent); }
  header p { color: var(--muted); font-size: 14px; }

  /* PROGRESS BAR */
  .progress-wrap { margin-bottom: 32px; }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .progress-meta span { color: var(--accent); }
  .progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* QUESTION CARD */
  .question-card {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 28px;
    margin-bottom: 0;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .q-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 18px;
  }
  .q-num {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }
  .q-badge {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    padding: 3px 10px;
    border-radius: 2px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .q-badge.easy { background: rgba(127,255,110,0.1); color: var(--easy); }
  .q-badge.medium { background: rgba(255,210,77,0.1); color: var(--medium); }
  .q-badge.hard { background: rgba(255,60,110,0.1); color: var(--hard); }
  .q-badge.scenario { background: rgba(177,111,255,0.1); color: var(--scenario); }

  .q-text {
    font-size: 17px;
    font-weight: 600;
    line-height: 1.55;
    margin-bottom: 24px;
  }

  /* OPTIONS */
  .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
  .option {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 13px 16px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    text-align: left;
    cursor: pointer;
    transition: all 0.15s;
    width: 100%;
    line-height: 1.5;
    border-radius: 2px;
  }
  .option:hover:not(:disabled) { border-color: var(--accent); background: rgba(0,229,255,0.04); }
  .option:disabled { cursor: default; }
  .option.selected { border-color: var(--accent); background: rgba(0,229,255,0.08); }
  .option.correct { border-color: var(--easy); background: rgba(127,255,110,0.1); color: var(--easy); }
  .option.wrong { border-color: var(--accent2); background: rgba(255,60,110,0.08); color: var(--accent2); }
  .option.reveal { border-color: var(--easy); background: rgba(127,255,110,0.06); }
  .option-letter {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    min-width: 18px;
    color: var(--muted);
    padding-top: 2px;
    flex-shrink: 0;
  }
  .option.correct .option-letter,
  .option.reveal .option-letter { color: var(--easy); }
  .option.wrong .option-letter { color: var(--accent2); }

  /* FEEDBACK */
  .feedback {
    display: none;
    margin-bottom: 20px;
  }
  .feedback.show { display: block; animation: fadeIn 0.25s ease; }

  .feedback-banner {
    padding: 10px 16px;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 12px;
    letter-spacing: 1px;
  }
  .feedback-banner.correct-banner { background: rgba(127,255,110,0.1); color: var(--easy); border-left: 3px solid var(--easy); }
  .feedback-banner.wrong-banner { background: rgba(255,60,110,0.08); color: var(--accent2); border-left: 3px solid var(--accent2); }

  .explanation-box {
    padding: 14px 16px;
    background: rgba(0,229,255,0.04);
    border-left: 3px solid var(--accent);
    font-size: 13px;
    color: var(--muted);
    line-height: 1.65;
  }
  .explanation-box strong { color: var(--text); }

  /* NOTES */
  .notes-wrap {
    display: none;
    margin-bottom: 20px;
  }
  .notes-wrap.show { display: block; animation: fadeIn 0.25s ease; }
  .notes-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .notes-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    padding: 12px 14px;
    resize: vertical;
    min-height: 80px;
    line-height: 1.5;
    transition: border-color 0.2s;
    border-radius: 2px;
  }
  .notes-input:focus { outline: none; border-color: var(--accent); }
  .notes-input::placeholder { color: var(--muted); }

  /* BUTTONS */
  .btn-row { display: flex; gap: 12px; flex-wrap: wrap; }
  .btn {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    padding: 11px 22px;
    border: 1px solid;
    background: transparent;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 1px;
    text-transform: uppercase;
    border-radius: 2px;
  }
  .btn-primary { border-color: var(--accent); color: var(--accent); }
  .btn-primary:hover { background: var(--accent); color: var(--bg); }
  .btn-primary:disabled { opacity: 0.3; cursor: default; }
  .btn-next { border-color: var(--easy); color: var(--easy); display: none; }
  .btn-next:hover { background: var(--easy); color: var(--bg); }
  .btn-next.show { display: block; }

  /* SCORE SUMMARY */
  #summary {
    display: none;
    background: var(--panel);
    border: 1px solid var(--border);
    border-top: 3px solid var(--accent3);
    padding: 40px 28px;
    animation: fadeIn 0.4s ease;
  }
  #summary.show { display: block; }
  #summary h2 { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
  #summary .grade {
    font-family: 'Space Mono', monospace;
    font-size: 64px;
    font-weight: 700;
    color: var(--accent);
    margin: 16px 0 8px;
    line-height: 1;
  }
  #summary .sub { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
  .score-breakdown {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 12px;
    margin-bottom: 28px;
  }
  .score-chip {
    padding: 14px;
    border: 1px solid var(--border);
    text-align: center;
  }
  .score-chip .chip-val {
    font-family: 'Space Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .score-chip .chip-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .score-chip.easy .chip-val { color: var(--easy); }
  .score-chip.medium .chip-val { color: var(--medium); }
  .score-chip.hard .chip-val { color: var(--hard); }
  .score-chip.scenario .chip-val { color: var(--scenario); }

  #summary .result-msg {
    font-size: 15px;
    color: var(--text);
    margin-bottom: 24px;
    line-height: 1.6;
  }

  /* NOTES REVIEW */
  .notes-review { margin-top: 32px; }
  .notes-review h3 {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .note-item {
    border: 1px solid var(--border);
    margin-bottom: 10px;
    padding: 14px 16px;
  }
  .note-item .note-q {
    font-size: 12px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    margin-bottom: 6px;
  }
  .note-item .note-text {
    font-size: 13px;
    color: var(--text);
    line-height: 1.55;
    white-space: pre-wrap;
  }

  @media (max-width: 500px) {
    .question-card { padding: 20px 16px; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="tag">// IRAT Preparation</div>
    <h1>Penetration Testing<br><span>Quiz</span></h1>
    <p>45 questions - answer one at a time, get instant feedback, take notes as you go.</p>
  </header>

  <div class="progress-wrap">
    <div class="progress-meta">
      <span>Question <span id="q-counter">1</span> of 45</span>
      <span id="score-live">Score: <span>0</span></span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <!-- QUESTION AREA -->
  <div id="question-area">
    <div class="question-card" id="q-card">
      <div class="q-meta">
        <span class="q-num" id="q-num">01 / 45</span>
        <span class="q-badge" id="q-badge">EASY</span>
      </div>
      <div class="q-text" id="q-text"></div>
      <div class="options" id="options-list"></div>

      <div class="feedback" id="feedback">
        <div class="feedback-banner" id="feedback-banner"></div>
        <div class="explanation-box" id="explanation-text"></div>
      </div>

      <div class="notes-wrap" id="notes-wrap">
        <div class="notes-label">My notes</div>
        <textarea class="notes-input" id="notes-input" placeholder="Write anything you want to remember about this question..."></textarea>
      </div>

      <div class="btn-row">
        <button class="btn btn-primary" id="btn-submit" onclick="submitAnswer()">Submit</button>
        <button class="btn btn-next" id="btn-next" onclick="nextQuestion()">Next Question</button>
      </div>
    </div>
  </div>

  <!-- SUMMARY -->
  <div id="summary">
    <h2>Quiz Complete</h2>
    <div class="grade" id="final-pct">--</div>
    <div class="sub" id="final-fraction">0 / 45 correct</div>
    <div class="score-breakdown">
      <div class="score-chip easy"><div class="chip-val" id="s-easy">0/13</div><div class="chip-label">Easy</div></div>
      <div class="score-chip medium"><div class="chip-val" id="s-medium">0/13</div><div class="chip-label">Medium</div></div>
      <div class="score-chip hard"><div class="chip-val" id="s-hard">0/10</div><div class="chip-label">Hard</div></div>
      <div class="score-chip scenario"><div class="chip-val" id="s-scenario">0/9</div><div class="chip-label">Scenario</div></div>
    </div>
    <div class="result-msg" id="result-msg"></div>
    <button class="btn btn-primary" onclick="restartQuiz()">Restart Quiz</button>

    <div class="notes-review" id="notes-review"></div>
  </div>

</div>

<script>
const questions = [
  // ---- EASY (1-13) ----
  {
    q: "What is the primary purpose of vulnerability scanning?",
    opts: ["To exploit vulnerabilities in a target system to gain access","To build an inventory of network devices and identify vulnerabilities that may affect each one","To perform social engineering attacks on employees","To replace firewall and IPS systems entirely"],
    ans: 1, diff: "easy",
    exp: "Vulnerability scanning builds an inventory of all devices on a network and creates a list of vulnerabilities that may affect each device. It is about identification and remediation, not exploitation."
  },
  {
    q: "What does CVE stand for?",
    opts: ["Common Vulnerability Exposure","Cyber Vulnerability Entry","Common Vulnerabilities and Exposures","Critical Vulnerability Evaluation"],
    ans: 2, diff: "easy",
    exp: "CVE stands for Common Vulnerabilities and Exposures, a publicly known list of vulnerabilities documented along with the software versions they affect."
  },
  {
    q: "What score range does CVSS use to rate vulnerability severity?",
    opts: ["1 to 5","0 to 100","0 to 10","1 to 10"],
    ans: 2, diff: "easy",
    exp: "CVSS scores range from 0 to 10, where 0 is least severe and 10 is most severe."
  },
  {
    q: "An authenticated (credentialed) scan differs from an unauthenticated scan in what key way?",
    opts: ["It is much faster and produces fewer results","It gains information from inside the device using admin credentials for an accurate assessment","It only scans external-facing ports","It simulates an attacker's perspective from outside the network"],
    ans: 1, diff: "easy",
    exp: "An authenticated scan uses administrative credentials to access the device from within, providing a far more accurate vulnerability assessment used to drive remediation."
  },
  {
    q: "Which organisation currently owns and manages the CVSS framework?",
    opts: ["NIST","FIRST","NIAC","DHS / CISA"],
    ans: 1, diff: "easy",
    exp: "FIRST (Forum of Incident Response and Security Teams) owns and manages CVSS. NIAC originally introduced it in 2005."
  },
  {
    q: "Vulnerability scanners are NOT effective at detecting which type of vulnerability?",
    opts: ["Known CVEs","Default credential usage","0-day vulnerabilities","Missing patches"],
    ans: 2, diff: "easy",
    exp: "Vulnerability scanners rely on databases of known vulnerabilities. They are not effective at detecting 0-day vulnerabilities because there are no known signatures for them yet."
  },
  {
    q: "A CVSS score of 9.5 falls into which severity category?",
    opts: ["High","Medium","Critical","Severe"],
    ans: 2, diff: "easy",
    exp: "Scores from 9.0 to 10.0 are rated Critical. High is 7.0 to 8.9, Medium is 4.0 to 6.9, and Low is 0.1 to 3.9."
  },
  {
    q: "What is the NCSC's definition of penetration testing?",
    opts: ["Automated scanning of a network for known CVEs","A method for gaining assurance in the security of an IT system by attempting to breach it using the same tools and techniques as an adversary","Physical security testing of server rooms and data centres","The process of installing security patches across an organisation"],
    ans: 1, diff: "easy",
    exp: "The NCSC defines pen testing as a method for gaining assurance in an IT system's security by attempting to breach it using the same tools and techniques as a real adversary."
  },
  {
    q: "Which of the following is a free and open-source vulnerability scanner?",
    opts: ["InsightVM","Nessus","OpenVAS","Qualys"],
    ans: 2, diff: "easy",
    exp: "OpenVAS, Nmap, and Nikto are free and open-source tools. InsightVM, Nessus, and Qualys are paid commercial scanners."
  },
  {
    q: "What is fingerprinting in the context of vulnerability scanning?",
    opts: ["Collecting biometric data from device users","Identifying operating systems and software versions by comparing responses with known indicators","Logging all network traffic to a central database","Encrypting scan results before sending to the console"],
    ans: 1, diff: "easy",
    exp: "Fingerprinting identifies the operating system and software versions on a device by comparing known indicators of hardware and software responses."
  },
  {
    q: "In the Rapid7 house analogy, what does port scanning compare to?",
    opts: ["Sending a ninja to try to break into the house","A home inspector with a clipboard checking door and lock quality","Using binoculars to look at all doors and windows and see which are open or closed","Physically kicking down the front door"],
    ans: 2, diff: "easy",
    exp: "Port scanning = using binoculars to see which doors/windows (ports) are open or closed. Vulnerability scanning = the home inspector assessing weaknesses. Pen testing = the ninja actually trying to break in."
  },
  {
    q: "What is the FIRST step of a penetration test according to the Rapid7 video?",
    opts: ["Network discovery and port scanning","Establishing a clear goal","Writing the final report","Exploitation"],
    ans: 1, diff: "easy",
    exp: "Before anything else, you establish a goal, for example 'breach a credit card database.' Everything that follows is directed by that goal."
  },
  {
    q: "What is pivoting in the context of a penetration test?",
    opts: ["Changing the scope of the test mid-engagement","Moving from one compromised machine to gain access to further machines on the same network","Rotating between different social engineering techniques","Switching from an external to an internal pen test"],
    ans: 1, diff: "easy",
    exp: "Pivoting means using your initial foothold on one machine to jump to the next machine, then the next, moving deeper into the network from a single entry point like a phishing email."
  },

  // ---- MEDIUM (14-26) ----
  {
    q: "Why does an unauthenticated scan tend to produce a high number of false positives?",
    opts: ["It runs too many tests simultaneously, causing system crashes","It cannot verify exact software versions without access, so it flags all potential issues for a detected service","It deliberately over-reports to ensure nothing is missed","It is not integrated with the CVE database"],
    ans: 1, diff: "medium",
    exp: "Without credentials, the scanner cannot determine the exact version of software running. For example, detecting OpenSSH remotely without device access means the scanner may flag ALL OpenSSH vulnerabilities."
  },
  {
    q: "Which CVSS metric group can change over time as patches or workarounds become available?",
    opts: ["Base metrics","Environmental metrics","Temporal metrics","Exploitability metrics"],
    ans: 2, diff: "medium",
    exp: "Temporal metrics represent properties of a vulnerability that can change over time, such as the release of an official patch or changes in exploit code maturity."
  },
  {
    q: "How does the NCSC distinguish penetration testing from a routine vulnerability assessment process?",
    opts: ["Penetration testing should replace the internal vulnerability assessment process","Pen testing is a method for gaining assurance in your vulnerability management processes, not a primary method for finding vulnerabilities","They are the same thing and the terms are interchangeable","Penetration testing is only used for web applications"],
    ans: 1, diff: "medium",
    exp: "The NCSC states pen testing should be viewed as a method for gaining assurance in your organisation's vulnerability assessment and management processes, not as the primary way to find vulnerabilities."
  },
  {
    q: "What is the key advantage of agent-based (host-based) scanning over network-based scanning?",
    opts: ["It can scan printers and network devices which agents cannot run on","It scans devices that are intermittently connected or outside the company network, like remote laptops","It requires no administrative permissions on the host device","It is always faster than a network-based scan"],
    ans: 1, diff: "medium",
    exp: "Agent-based scanning is especially useful for devices only intermittently connected to the company network, such as employee laptops at home. Network scanners can only scan devices available on the network at the time."
  },
  {
    q: "Which CVSS metric group is calculated by the end user (not the vendor) and is entirely optional?",
    opts: ["Base metrics","Temporal metrics","Environmental metrics","Impact metrics"],
    ans: 2, diff: "medium",
    exp: "The Environmental group score is calculated by the end user (not the vendor) and is optional. It refines the Base score to reflect the organisation's own environment and business context."
  },
  {
    q: "Why is it NOT advisable to allow a network-based vulnerability scanner full access to all ports across a firewall?",
    opts: ["It would make the scan run too slowly","It compromises network segmentation and security. The solution is to deploy secondary scanners in different network segments","Scanners are not capable of handling that many connections","Firewalls always block scanner traffic completely"],
    ans: 1, diff: "medium",
    exp: "Allowing full access through a firewall removes important security segmentation. The recommended solution is to deploy secondary scanners on different sides of the firewall, reporting back to the primary console over a single encrypted TCP connection."
  },
  {
    q: "What is a major limitation of relying solely on publicly available CVSS scores when prioritising vulnerability remediation?",
    opts: ["Public CVSS scores are always inaccurate","They only reflect Base scores and neglect real-world exploits, available mitigations, and the business context of the affected asset","CVSS scores are not publicly available","The scores change too frequently to rely on"],
    ans: 1, diff: "medium",
    exp: "Public databases like NIST NVD only show Base scores. Sole reliance on these neglects real-world exploit availability, existing mitigations, and the specific importance of the affected asset to the organisation."
  },
  {
    q: "What are the three ways a vulnerability scanner fingerprints devices on the network?",
    opts: ["Ping, SYN scan, UDP scan","MAC address, port fingerprinting, banner grabbing","Logs, enumeration, agent polling","SNMP polling, WMI queries, SSH commands"],
    ans: 1, diff: "medium",
    exp: "The three fingerprinting techniques are MAC address analysis, port fingerprinting (inferring OS from open ports), and banner grabbing (services responding with version info to Nmap probes)."
  },
  {
    q: "In what key way does a penetration test differ from a vulnerability scan?",
    opts: ["A vulnerability scan is manual; a penetration test is automated","A penetration test identifies AND exploits vulnerabilities; a scan only identifies weaknesses","Penetration tests only target web applications","Vulnerability scans require legal sign-off; penetration tests do not"],
    ans: 1, diff: "medium",
    exp: "A vulnerability scan focuses on identifying weaknesses. A penetration test goes further by identifying AND exploiting vulnerabilities with the goal of gaining a foothold in the network, just as a real adversary would."
  },
  {
    q: "Which type of vulnerability scan should be used against web applications to detect SQL injection or XSS?",
    opts: ["Host-based scan","Wireless scan","Application scan","Database scan"],
    ans: 2, diff: "medium",
    exp: "Application scans crawl web application pages, follow links, and test input fields for vulnerabilities such as SQL injection and cross-site scripting (XSS), the most critical vulnerability type for web applications."
  },
  {
    q: "What is the difference between an internal and an external penetration test?",
    opts: ["Internal tests are automated; external tests are manual","An external test assumes the attacker comes from the internet; an internal test assumes the attacker is already inside the network (e.g. a malicious insider or someone with physical access)","External tests cover web apps only; internal tests cover the full network","An internal test is done by staff; an external test is always outsourced"],
    ans: 1, diff: "medium",
    exp: "External means the attacker attacks from outside over the internet. Internal means the attacker is already inside, which could be a malicious insider, consultant with physical access, or someone who plugged a device into the network."
  },
  {
    q: "Which of the following is listed as a valid reason to conduct a penetration test?",
    opts: ["To replace the need for a firewall","To establish a security baseline for a new CISO joining an organisation","To train junior developers in coding best practices","To automatically patch discovered vulnerabilities"],
    ans: 1, diff: "medium",
    exp: "Valid reasons include preventing data breaches, testing security controls, securing new systems before production, establishing a security baseline (e.g. for a new CISO), and meeting compliance requirements like PCI."
  },
  {
    q: "What should you collect BEFORE writing the final pen test report, and why?",
    opts: ["A list of all CVEs found, to include their CVSS scores in the report","Evidence such as screenshots, downloaded files, and harvested passwords to prove to the client that you actually gained access","Permission from the organisation's legal team to publish findings","A full network diagram from the discovery phase"],
    ans: 1, diff: "medium",
    exp: "Before writing the report, you must collect evidence including screenshots, downloaded files, and captured password hashes to prove to the client that you genuinely breached their systems."
  },
  {
    q: "When is it generally more cost-effective to outsource a pen test rather than build an in-house capability?",
    opts: ["When the organisation has more than 500 employees","When the organisation only runs one pen test per year, making training staff and buying tools unjustifiable","When the organisation is subject to PCI compliance","When the pen test needs to cover wireless networks"],
    ans: 1, diff: "medium",
    exp: "If you only run one pen test a year, outsourcing is usually more cost-effective. In-house capability makes more sense if you want more frequent testing such as monthly."

  // ---- HARD (27-36) ----
  {
    q: "A TCP SYN scan is sometimes called a stealth scan. Why does it avoid completing the TCP handshake, and what is the practical consequence for some firewalls?",
    opts: ["It completes the handshake but immediately resets, triggering all IDS systems","It never fully establishes a TCP connection; some firewalls respond with a TCP RESET which could be misread as an active device, and some scanners are configured to ignore or handle this","It uses UDP instead of TCP, bypassing all packet filtering","It encrypts all probe packets so they cannot be logged by firewalls"],
    ans: 1, diff: "hard",
    exp: "A SYN scan sends a SYN packet and considers any response as an active device indicator, without completing the handshake. Some firewalls respond with a TCP RESET, which might indicate a device behind the firewall or the firewall itself. Most scanners can be configured to skip ping requests or ignore TCP RESETs accordingly."
  },
  {
    q: "You run a credentialed network scan of Cisco routers and the results say they are Apple iPhones with 85% confidence. What is the MOST likely explanation?",

    exp: "This is a classic credentialed scan failure. When credentials do not grant device access, the scanner falls back to external fingerprinting which gives only 85% confidence. The most likely cause is that credentials failed to authenticate against the devices."

  {

  {

    exp: "Unpatched vulnerabilities with a CVSS score of 4.0 or higher (Medium and above) have an adverse effect on Payment Card Industry Data Security Standard (PCI DSS) compliance."

  {

    opts: ["To reduce the cost of the engagement","To test whether the security team's detection and response capabilities actually pick up a real attack simulation, as their reaction is part of what is being assessed","Because informing the team is a legal requirement that must be avoided","To prevent them from blocking the pen test tools at the firewall"],
    ans: 1, diff: "hard",
    exp: "One goal of pen testing is to test whether your security controls and team actually detect an attack. If the security team knows a test is happening they will be on high alert, defeating the purpose of testing real detection and response capability."
  },
  {
    q: "When testing production environments, what is the recommended approach for exploit selection and why?",
    opts: ["Use the most aggressive exploits to find all vulnerabilities quickly","Only use exploits ranked as excellent or great reliability (e.g. via Metasploit rankings) to avoid causing unintended damage or downtime to live systems","Avoid all exploitation and only run passive scans in production","Use only open-source exploits so results can be independently verified"],
    ans: 1, diff: "hard",
    exp: "Production environments must keep running. Tools like Metasploit rank exploits by reliability. Only excellent or great rated exploits should be used in production to ensure the test does not accidentally cause outages or data loss."
  },

  // ---- SCENARIO (37-45) ----
  {

    opts: ["Penetration tests should be done quarterly, not annually","A pen test only validates that systems were not vulnerable to known issues on the day of the test. New vulnerabilities can emerge at any time afterwards","The pen test was probably not thorough enough","Pen tests cannot be used to prove security compliance"],
    ans: 1, diff: "scenario",
    exp: "The NCSC explicitly states that a pen test can only validate that systems are not vulnerable to known issues on the day of the test. Vulnerabilities could exist for long periods between tests if it is the only validation method."

  {
    q: "SCENARIO: A company's network scanner keeps losing track of a laptop used by a remote salesperson because its IP address changes constantly. What is the BEST solution?",

    exp: "Agent-based scanning solves the dynamic environment problem. Each agent has its own unique ID, so even if the IP, hostname, or MAC address changes, scan results are always attributed to the correct device."

  {
    q: "SCENARIO: Your scanner detects a vulnerability in Postgres databases whenever it finds port 5432 open. A developer says 'we are safe, we patched it.' What additional check should the scanner also perform to confirm remediation?",
    opts: ["Run an unauthenticated external scan to verify from the attacker perspective","Check for both the patch AND other known security risks such as default credentials and weak password configurations","Close port 5432 in the firewall","Trust the developer's word and mark the vulnerability as resolved"],
    ans: 1, diff: "scenario",

  {

    opts: ["Immediately patch all systems with a CVSS score above 4.0","Commission a penetration test to establish a security baseline and understand where the biggest vulnerabilities and weaknesses are","Buy the most expensive commercial vulnerability scanner available","Restrict all external network access until the risks are understood"],
    ans: 1, diff: "scenario",
    exp: "The Rapid7 video specifically mentions that pen tests are valuable for establishing a security baseline when you are new to an organisation. A pen test will reveal which systems are insecure and which attack methods work, giving the CISO actionable insight on where to focus security investment."

let current = 0;
let score = 0;
let selected = null;
let answered = false;
const notes = {};
const results = [];

const diffCount = { easy: 13, medium: 13, hard: 10, scenario: 9 };
const diffScore = { easy: 0, medium: 0, hard: 0, scenario: 0 };

// Shuffled question order and per-question shuffled option order
let questionOrder = [];
let optionOrders = []; // optionOrders[i] = shuffled indices for question i

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildShuffledDeck() {
  questionOrder = shuffle([...Array(questions.length).keys()]);
  optionOrders = questions.map(q => shuffle([...Array(q.opts.length).keys()]));
}

function loadQuestion() {
  const qIdx = questionOrder[current];
  const q = questions[qIdx];
  const shuffledOpts = optionOrders[qIdx]; // e.g. [2, 0, 3, 1]
  const correctOriginalIdx = q.ans;
  // Find where the correct answer ended up after shuffle
  const correctShuffledPos = shuffledOpts.indexOf(correctOriginalIdx);
  const letters = ['A','B','C','D'];

  document.getElementById('q-counter').textContent = current + 1;
  document.getElementById('q-num').textContent = `${String(current+1).padStart(2,'0')} / 45`;

  const badge = document.getElementById('q-badge');
  badge.textContent = q.diff.toUpperCase();
  badge.className = `q-badge ${q.diff}`;

  document.getElementById('q-text').textContent = q.q;

  const optsList = document.getElementById('options-list');
  optsList.innerHTML = '';
  shuffledOpts.forEach((origIdx, displayPos) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.innerHTML = `<span class="option-letter">${letters[displayPos]}</span>${q.opts[origIdx]}`;
    btn.onclick = () => selectOpt(displayPos, correctShuffledPos);
    btn.id = `opt-${displayPos}`;
    optsList.appendChild(btn);
  });

  // Reset UI
  document.getElementById('feedback').classList.remove('show');
  document.getElementById('notes-wrap').classList.remove('show');
  document.getElementById('notes-input').value = notes[current] || '';
  document.getElementById('btn-submit').disabled = true;
  document.getElementById('btn-next').classList.remove('show');
  document.getElementById('btn-next').textContent = current < questions.length - 1 ? 'Next Question' : 'See Results';

  selected = null;
  answered = false;

  // Store correct shuffled position for submitAnswer to use
  loadQuestion._correctPos = correctShuffledPos;

  // Progress
  const pct = (current / questions.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
}

function selectOpt(displayPos, correctPos) {
  if (answered) return;
  selected = { displayPos, correctPos };
  document.querySelectorAll('.option').forEach((b, idx) => {
    b.classList.toggle('selected', idx === displayPos);
  });
  document.getElementById('btn-submit').disabled = false;
}

function submitAnswer() {
  if (selected === null || answered) return;
  answered = true;

  const qIdx = questionOrder[current];
  const q = questions[qIdx];
  const { displayPos, correctPos } = selected;
  const isCorrect = displayPos === correctPos;

  document.querySelectorAll('.option').forEach((btn, i) => {
    btn.disabled = true;
    btn.classList.remove('selected');
    if (i === correctPos) btn.classList.add(isCorrect && i === displayPos ? 'correct' : 'reveal');
    if (i === displayPos && !isCorrect) btn.classList.add('wrong');
  });

  const banner = document.getElementById('feedback-banner');
  banner.textContent = isCorrect ? 'Correct!' : 'Incorrect';
  banner.className = `feedback-banner ${isCorrect ? 'correct-banner' : 'wrong-banner'}`;

  document.getElementById('explanation-text').innerHTML = q.exp;
  document.getElementById('feedback').classList.add('show');
  document.getElementById('notes-wrap').classList.add('show');
  document.getElementById('btn-submit').disabled = true;
  document.getElementById('btn-next').classList.add('show');

  if (isCorrect) {
    score++;
    diffScore[q.diff]++;
  }

  results.push({ q: q.q, correct: isCorrect, diff: q.diff });

  const scoreLive = document.getElementById('score-live');
  scoreLive.innerHTML = `Score: <span>${score}</span>`;
  document.getElementById('progress-fill').style.width = ((current + 1) / questions.length * 100) + '%';
}

function nextQuestion() {
  // Save notes
  notes[current] = document.getElementById('notes-input').value;

  current++;
  if (current >= questions.length) {
    showSummary();
  } else {
    loadQuestion();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function showSummary() {
  document.getElementById('question-area').style.display = 'none';
  document.getElementById('progress-fill').style.width = '100%';

  const pct = Math.round((score / questions.length) * 100);
  document.getElementById('final-pct').textContent = pct + '%';
  document.getElementById('final-fraction').textContent = `${score} / ${questions.length} correct`;

  document.getElementById('s-easy').textContent = `${diffScore.easy}/${diffCount.easy}`;
  document.getElementById('s-medium').textContent = `${diffScore.medium}/${diffCount.medium}`;
  document.getElementById('s-hard').textContent = `${diffScore.hard}/${diffCount.hard}`;
  document.getElementById('s-scenario').textContent = `${diffScore.scenario}/${diffCount.scenario}`;

  const msg = pct === 100 ? 'Perfect score! You are fully ready for the IRAT.' :
              pct >= 80 ? 'Strong result. Review the questions you missed and you are good to go.' :
              pct >= 60 ? 'Good effort. Re-read the explanations for the questions you got wrong.' :
              'Keep reviewing. Focus especially on the Hard and Scenario sections.';
  document.getElementById('result-msg').textContent = msg;

  // Notes review
  const notesHtml = Object.entries(notes).filter(([,v]) => v && v.trim()).map(([i, v]) => `
    <div class="note-item">
      <div class="note-q">Q${parseInt(i)+1} - ${questions[i].diff.toUpperCase()}</div>
      <div class="note-text">${v}</div>
    </div>
  `).join('');

  if (notesHtml) {
    document.getElementById('notes-review').innerHTML = `
      <div class="notes-review">
        <h3>// Your Notes</h3>
        ${notesHtml}
      </div>`;
  }

  document.getElementById('summary').classList.add('show');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restartQuiz() {
  current = 0; score = 0; selected = null; answered = false;
  Object.keys(notes).forEach(k => delete notes[k]);
  Object.keys(diffScore).forEach(k => diffScore[k] = 0);
  buildShuffledDeck();
  document.getElementById('question-area').style.display = 'block';
  document.getElementById('summary').classList.remove('show');
  document.getElementById('score-live').innerHTML = 'Score: <span>0</span>';
  loadQuestion();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Init
buildShuffledDeck();
loadQuestion();
</script>
